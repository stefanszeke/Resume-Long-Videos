<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume Long Videos Settings</title>
  <link rel="stylesheet" href="options.compact.css">
</head>
<body>
  <main>
    <h1>Resume Long Videos Settings</h1>

    <form id="settingsForm">
      <label>
        <span>Minimum video length</span>
        <input id="minDurationMinutes" type="number" min="1" step="1" required>
        <span class="unit">minutes</span>
      </label>

      <label>
        <span>Save interval</span>
        <input id="saveIntervalSeconds" type="number" min="1" step="1" required>
        <span class="unit">seconds</span>
      </label>

      <label>
        <span>Ignore first</span>
        <input id="ignoreFirstSeconds" type="number" min="0" step="1" required>
        <span class="unit">seconds</span>
      </label>

      <label>
        <span>Ignore last</span>
        <input id="ignoreLastSeconds" type="number" min="0" step="1" required>
        <span class="unit">seconds</span>
      </label>

      <div class="actions">
        <button type="submit">Save settings</button>
        <span id="status" role="status" aria-live="polite"></span>
      </div>
    </form>

    <section>
      <h2>Saved Positions</h2>
      <div class="saved-tools">
        <input id="filterSaved" type="search" placeholder="Filter saved videos">
        <p id="savedCount">Loading saved data...</p>
      </div>
      <div class="saved-container">
        <div id="savedPositions" class="saved-list"></div>
      </div>
      <div class="actions">
        <button id="clearData" type="button" class="danger">Clear saved video positions</button>
        <span id="clearStatus" role="status" aria-live="polite"></span>
      </div>
    </section>

    <section>
      <h2>Excluded Videos</h2>
      <div class="saved-tools">
        <input id="filterExcluded" type="search" placeholder="Filter excluded videos">
        <p id="excludedCount">Loading excluded videos...</p>
      </div>
      <div class="saved-container">
        <div id="excludedVideos" class="saved-list"></div>
      </div>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
